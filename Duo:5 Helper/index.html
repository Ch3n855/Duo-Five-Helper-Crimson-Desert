<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duo/5 Helper — Crimson Desert</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600;700&family=Google+Sans+Display:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell">

  <header class="bar">
    <div class="bar-brand">
      <span class="bar-title">DUO/5 Helper</span>
      <span class="bar-sub">Crimson Desert</span>
    </div>
    <div class="bar-center">
      <div class="mode-tabs">
        <button class="mode-tab on" id="tab-duo" onclick="setMode('duo')">Duo</button>
        <button class="mode-tab" id="tab-cinq" onclick="setMode('cinq')">Cinq-Cartes</button>
        <button class="mode-tab" id="tab-cheat" onclick="setMode('cheat')">Spot Cheaters</button>
        <button class="mode-tab" id="tab-fedora" onclick="setMode('fedora')">Fedora Guide</button>
      </div>
    </div>
    <div class="bar-right" id="bar-right"></div>
  </header>

  <div class="arena" id="arena"></div>

</div>
<script src="js/state.js"></script>
<script src="js/logic.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
